<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Indian Creek Cycle Rentals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">
        <a href="index.html">
          <img src="media/logo.png" alt="Indian Creek Cycle Rentals logo">
        </a>
      </div>

    <nav class="center-nav">
        <a href="index.html">Home</a>
        <a href="adults.html">Adults</a>
        <a href="kids.html">Kids</a>
        <a href="accessories.html">Accessories</a>
    </nav>

    <div class="right-nav">
        <a href="about.html">About Us</a>
        <a href="cart.html">Cart</a>
        <button id="darkModeBtn">🌙</button>
       
    </div>
</header>

<!-- PAGE TITLE -->
<section class="page-title">
    <h1>Your Cart</h1>
    <p>Review your selected bikes and accessories before checkout</p>
</section>

<!-- CART CONTENT -->
<section class="bike-grid">

    <!-- Example Item 1 -->
    <div class="bike-card">
        <div class="bike-image"></div>
        <h3>Adult Mountain Bike</h3>
        <p>Duration: 1 Hour</p>
        <p><strong>$25</strong></p>
        <button class="reserve-btn">Remove</button>
    </div>

    <!-- Example Item 2 -->
    <div class="bike-card">
        <div class="bike-image"></div>
        <h3>Helmet</h3>
        <p>Accessory</p>
        <p><strong>$5</strong></p>
        <button class="reserve-btn">Remove</button>
    </div>

</section>

<!-- TOTAL + ACTIONS -->
<section class="page-title">
    <h2>Total: $30</h2>
    <div class="buttons">
        <a href="adults.html"><button class="secondary-btn">Continue Shopping</button></a>
        <a href="reservation.html"><button class="primary-btn">Checkout</button></a>
    </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
    <p>© 2026 Indian Creek Cycle Rentals</p>
    <a href="admin.html">Admin</a>
  </footer>

<script src="script.js"></script>
</body>
</html>
