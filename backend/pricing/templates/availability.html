<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Availability Controls</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class ="admin-page">

<header class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="media/logo.png" alt="Indian Creek Cycle Rentals logo">
    </a>
  </div>

  <nav class="center-nav">
    <a class="btn" href="index.html">Public Site</a>
  </nav>

  <div class="right-nav">
    <div class="dropdown">
    <span class="admin-badge">Admin Panel</span>
    <div class="dropdown-content">
    <a href="admin.html">Dashboard</a>

    </div>
</header>

<section class="page-title">
  <h1>Availability Controls</h1>
  <p>Mark bikes available, unavailable, or in maintenance.</p>
</section>



<section class="admin-section" id="availability">
  <h2>Update Bike Status</h2>

  <div class="admin-actions">
    <label class="inline">
      Bike ID:
      <input type="text" placeholder="e.g., 101" />
    </label>

    <label class="inline">
      Status:
      <select>
        <option>Available</option>
        <option>Unavailable</option>
        <option>Maintenance</option>
      </select>
    </label>

    <button class="btn" type="button">Update</button>
  </div>

</section>

<footer class="site-footer">
  <p>© 2026 Indian Creek Cycle Rentals</p>
</footer>

<script src="script.js"></script>
</body>
