{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Availability Controls</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body class="admin-page">

<header class="navbar">
  <div class="logo">
    <a href="{% url 'home' %}">
        <img src="{% static 'media/logo.png' %}" alt="Indian Creek Cycle Rentals logo">
    </a>
  </div>

  <nav class="center-nav">
    <a class="btn" href="{% url 'home' %}">Public Site</a>
  </nav>

  <div class="right-nav">
    <div class="dropdown">
    <span class="admin-badge">Admin Panel</span>
    <div class="dropdown-content">
    <a href="{% url 'admin-page' %}">Dashboard</a>
    <a href="{% url 'bike-inventory' %}">Manage Bikes</a>
    <a href="{% url 'reservations' %}">View Reservations/Rentals</a>
  </div>
    </div>
</header>

<section class="page-title">
  <h1>Availability Controls</h1>
  <p>Mark bikes available, unavailable, or in maintenance.</p>
</section>

<section class="admin-section" id="availability">
  <h2>Update Bike Status</h2>

  <div class="admin-actions">
    <label class="inline">
      Bike ID:
      <input type="text" placeholder="e.g., 101" />
    </label>

    <label class="inline">
      Status:
      <select>
        <option>Available</option>
        <option>Unavailable</option>
        <option>Maintenance</option>
      </select>
    </label>

    <button class="btn" type="button">Update</button>
  </div>
</section>

<footer class="site-footer">
  <p>© 2026 Indian Creek Cycle Rentals</p>
  <form action="{% url 'logout' %}" method="post" style="display:inline;">
      {% csrf_token %}
      <button type="submit" style="background:none; border:none; color:#007bff; text-decoration:underline; cursor:pointer; font-family:inherit; padding:0;">Logout</button>
  </form>
</footer>

<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
