{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="{% static 'css/admin.css' %}"> </head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div style="background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px; text-align: center; border: 1px solid #444;">
        <img src="{% static 'images/logo.png' %}" alt="Logo" style="width: 150px; margin-bottom: 20px;">
        <h2 style="color: white; margin-bottom: 20px;">Admin Login</h2>
        
        <form method="post">
            {% csrf_token %}
            <div style="color: white; text-align: left; margin-bottom: 15px;">
                {{ form.as_p }}
            </div>
            <button type="submit" style="background-color: #d9534f; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                Login
            </button>
        </form>
    </div>

</body>
</html>
