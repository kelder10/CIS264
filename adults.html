<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adult Bikes - Indian Creek Cycle Rentals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">Indian Creek Cycle Rentals</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="adults.html">Adults</a>
        <a href="kids.html">Kids</a>
        <button id="darkModeBtn">🌙</button>
    </nav>
</header>

<section class="page-title">
    <h1>Adult Bikes</h1>
    <p>Choose the perfect bike for your ride</p>
</section>

<!-- FILTER SECTION -->
<section class="filters">
    <select id="typeFilter">
        <option value="all">All Types</option>
        <option value="mountain">Mountain</option>
        <option value="road">Road</option>
        <option value="hybrid">Hybrid</option>
    </select>

    <select>
        <option>Duration</option>
        <option>1 Hour</option>
        <option>Half Day</option>
        <option>Full Day</option>
    </select>
</section>

<!-- BIKE CARDS -->
<section class="bike-grid">

    <div class="bike-card" data-type="mountain">
        <div class="bike-image"></div>
        <h3>Mountain Bike</h3>
        <p>$25 / hour</p>
        <button class="reserve-btn">Reserve</button>
    </div>

    <div class="bike-card" data-type="road">
        <div class="bike-image"></div>
        <h3>Road Bike</h3>
        <p>$20 / hour</p>
        <button class="reserve-btn">Reserve</button>
    </div>

    <div class="bike-card" data-type="hybrid">
        <div class="bike-image"></div>
        <h3>Hybrid Bike</h3>
        <p>$22 / hour</p>
        <button class="reserve-btn">Reserve</button>
    </div>

</section>

<footer>
    <p>© 2026 Indian Creek Cycle Rentals</p>
</footer>

<script src="script.js"></script>

</body>
</html>
